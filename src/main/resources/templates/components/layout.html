<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${title}">Smart IDM</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- App styles -->
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<!-- Sidebar fragment: принимает параметр active (ключ текущей секции) -->
<div th:fragment="sidebar(active)">
    <nav class="sidebar d-flex flex-column p-3 bg-white border-end">
        <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">
            <span class="fs-5 fw-semibold">Smart IDM</span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a th:href="@{/dashboard}" th:classappend="${active == 'dashboard'} ? ' active' : ''" class="nav-link">
                    <i class="bi bi-speedometer2 me-2"></i>
                    Dashboard
                </a>
            </li>
            <li>
                <a th:href="@{/users}" th:classappend="${active == 'users'} ? ' active' : ''" class="nav-link text-dark">
                    <i class="bi bi-people me-2"></i>
                    Users
                </a>
            </li>
            <li>
                <a th:href="@{/requests}" th:classappend="${active == 'requests'} ? ' active' : ''" class="nav-link text-dark">
                    <i class="bi bi-card-checklist me-2"></i>
                    Requests
                </a>
            </li>
            <li>
                <a th:href="@{/audit}" th:classappend="${active == 'audit'} ? ' active' : ''" class="nav-link text-dark">
                    <i class="bi bi-journal-text me-2"></i>
                    Audit Logs
                </a>
            </li>
            <li>
                <a th:href="@{/profile}" th:classappend="${active == 'profile'} ? ' active' : ''" class="nav-link text-dark">
                    <i class="bi bi-person-circle me-2"></i>
                    Profile
                </a>
            </li>
        </ul>
        <hr />
        <div class="mt-auto">
            <small class="text-muted">© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> Smart IDM</small>
        </div>
    </nav>
</div>

<!-- Header fragment: показывает текущего пользователя и кнопку выхода -->
<header th:fragment="header">
    <nav class="navbar navbar-expand bg-white border-bottom">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-secondary me-2 d-md-none" id="toggleSidebar"><i class="bi bi-list"></i></button>
                <h5 class="mb-0" th:text="${pageTitle != null} ? ${pageTitle} : 'Панель управления'">Панель управления</h5>
            </div>
            <div class="d-flex align-items-center">
                <div class="me-3 text-end d-none d-md-block">
                    <div class="fw-semibold text-dark" th:text="${currentUserFullName}">Администратор</div>
                    <div class="text-muted small" th:text="${currentUserLogin}">admin</div>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i> Sign Out
                    </button>
                </form>
            </div>
        </div>
    </nav>
</header>

<!-- Scripts fragment -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Простая логика для переключения сайдбара на маленьких экранах
        document.addEventListener('DOMContentLoaded', function () {
            var btn = document.getElementById('toggleSidebar');
            if (btn) {
                btn.addEventListener('click', function () {
                    document.querySelector('.sidebar').classList.toggle('collapsed');
                });
            }
        });
    </script>
</div>

</body>
</html>
