<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout :: head('Audit — Smart IDM')}"></head>
<body>
<div class="d-flex vh-100">
    <aside th:replace="~{components/layout :: sidebar('audit')}"></aside>

    <main class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{components/layout :: header}"></div>

        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 th:text="${pageTitle}">Журнал аудита</h5>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <!-- Фильтры -->
            <div class="card mb-3">
                <div class="card-body">
                    <form th:action="@{/audit}" method="get" class="row g-3">
                        <div class="col-md-3">
                            <label for="eventType" class="form-label">Тип события</label>
                            <select id="eventType" name="eventType" class="form-select">
                                <option value="">Все типы</option>
                                <option th:each="type : ${eventTypes}"
                                        th:value="${type}"
                                        th:text="${type}"
                                        th:selected="${selectedEventType} == ${type}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="userId" class="form-label">Пользователь</label>
                            <select id="userId" name="userId" class="form-select">
                                <option value="">Все пользователи</option>
                                <option th:each="user : ${users}"
                                        th:value="${user.id}"
                                        th:text="${user.lastName} + ' ' + ${user.firstName}"
                                        th:selected="${selectedUserId} == ${user.id}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label for="fromDate" class="form-label">С даты</label>
                            <input type="date" id="fromDate" name="fromDate" class="form-control"
                                   th:value="${fromDate}"/>
                        </div>
                        <div class="col-md-2">
                            <label for="toDate" class="form-label">По дату</label>
                            <input type="date" id="toDate" name="toDate" class="form-control"
                                   th:value="${toDate}"/>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-funnel"></i> Фильтр
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Таблица логов -->
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>Время</th>
                            <th>Пользователь</th>
                            <th>Тип события</th>
                            <th>Описание</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="log : ${logs.content}">
                            <td th:text="${#temporals.format(log.eventTime, 'yyyy-MM-dd HH:mm:ss')}">-</td>
                            <td th:text="${log.user != null ? log.user.login : 'system'}">-</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${#strings.startsWith(log.eventType, 'HR_EVENT') ? 'bg-success' :
                                                       (#strings.startsWith(log.eventType, 'ACCESS_REQUEST') ? 'bg-primary' :
                                                       (#strings.startsWith(log.eventType, 'ROLE_') ? 'bg-warning text-dark' :
                                                       (#strings.startsWith(log.eventType, 'DEPARTMENT_') ? 'bg-info text-dark' :
                                                       (#strings.startsWith(log.eventType, 'INDIRECT_') ? 'bg-purple' :
                                                       'bg-secondary'))))}"
                                      th:text="${log.eventType}">-</span>
                            </td>
                            <td th:text="${log.description}">-</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(logs.content)}">
                            <td colspan="4" class="text-center text-muted">Нет записей в журнале аудита</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Пагинация -->
            <nav th:if="${logs.totalPages > 1}" aria-label="Page navigation" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/audit(page=0, size=${logs.size}, eventType=${selectedEventType}, userId=${selectedUserId}, fromDate=${fromDate}, toDate=${toDate})}">
                            <i class="bi bi-chevron-double-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:classappend="${!logs.hasPrevious()} ? 'disabled'">
                        <a class="page-link" th:href="@{/audit(page=${logs.number - 1}, size=${logs.size}, eventType=${selectedEventType}, userId=${selectedUserId}, fromDate=${fromDate}, toDate=${toDate})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>

                    <li class="page-item" th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}"
                        th:if="${i >= logs.number - 2 and i <= logs.number + 2}"
                        th:classappend="${i == logs.number} ? 'active'">
                        <a class="page-link" th:href="@{/audit(page=${i}, size=${logs.size}, eventType=${selectedEventType}, userId=${selectedUserId}, fromDate=${fromDate}, toDate=${toDate})}"
                           th:text="${i + 1}">1</a>
                    </li>

                    <li class="page-item" th:classappend="${!logs.hasNext()} ? 'disabled'">
                        <a class="page-link" th:href="@{/audit(page=${logs.number + 1}, size=${logs.size}, eventType=${selectedEventType}, userId=${selectedUserId}, fromDate=${fromDate}, toDate=${toDate})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                    <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/audit(page=${logs.totalPages - 1}, size=${logs.size}, eventType=${selectedEventType}, userId=${selectedUserId}, fromDate=${fromDate}, toDate=${toDate})}">
                            <i class="bi bi-chevron-double-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="text-muted small mt-2 text-center" th:if="${logs.totalPages > 0}">
                Страница <span th:text="${logs.number + 1}">1</span> из <span th:text="${logs.totalPages}">1</span>
                (всего записей: <span th:text="${logs.totalElements}">0</span>)
            </div>
        </div>
    </main>
</div>

<div th:replace="~{components/layout :: scripts}"></div>

<style>
.bg-purple {
    background-color: #6f42c1 !important;
}
</style>
</body>
</html>
