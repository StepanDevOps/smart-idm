<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout :: head('Create Account — Smart IDM')}"></head>
<body>
<div class="d-flex vh-100">
    <aside th:replace="~{components/layout :: sidebar('target-systems')}"></aside>

    <main class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{components/layout :: header}"></div>

        <div class="container py-4">
            <h5 th:text="${pageTitle}">Добавить аккаунт</h5>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="card-body">
                    <form method="post" th:action="@{/users/{userId}/accounts/create(userId=${user.id})}">
                        <div class="mb-3">
                            <label class="form-label">Пользователь</label>
                            <input type="text" class="form-control" 
                                   th:value="${user.firstName} + ' ' + ${user.lastName} + ' (' + ${user.login} + ')'" 
                                   readonly />
                            <input type="hidden" name="userId" th:value="${user.id}" />
                        </div>

                        <div class="mb-3">
                            <label for="systemId" class="form-label">Целевая система <span class="text-danger">*</span></label>
                            <select id="systemId" name="systemId" class="form-select" required>
                                <option value="">-- Выберите систему --</option>
                                <option th:each="system : ${systems}"
                                        th:value="${system.id}"
                                        th:text="${system.name}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="accountLogin" class="form-label">Логин аккаунта <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="accountLogin" name="accountLogin" 
                                   placeholder="например: ivanov@company.com" required />
                            <div class="form-text">Логин/email для доступа к системе</div>
                        </div>

                        <div class="mb-3">
                            <label for="roleId" class="form-label">Роль (опционально)</label>
                            <select id="roleId" name="roleId" class="form-select">
                                <option value="">-- Не назначать --</option>
                                <option th:each="role : ${roles}"
                                        th:value="${role.id}"
                                        th:text="${role.name} + ' (' + ${role.system != null ? role.system.name : 'Общая'} + ')'">
                                </option>
                            </select>
                        </div>

                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> 
                            При создании аккаунта вручную, провижининг имитируется и сразу помечается как успешный.
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Создать аккаунт</button>
                            <a th:href="@{/users/{id}/accounts(id=${user.id})}" class="btn btn-outline-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{components/layout :: scripts}"></div>
</body>
</html>
