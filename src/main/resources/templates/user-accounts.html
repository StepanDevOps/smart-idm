<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout :: head('User Accounts — Smart IDM')}"></head>
<body>
<div class="d-flex vh-100">
    <aside th:replace="~{components/layout :: sidebar('target-systems')}"></aside>

    <main class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{components/layout :: header}"></div>

        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 th:text="${pageTitle}">Аккаунты пользователя</h5>
                <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Назад к пользователю
                </a>
            </div>

            <div class="card mb-3">
                <div class="card-body">
                    <strong>Пользователь:</strong> <span th:text="${user.firstName} + ' ' + ${user.lastName}"></span><br />
                    <strong>Login:</strong> <span th:text="${user.login}"></span><br />
                    <strong>Email:</strong> <span th:text="${user.emailWork}"></span>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Система</th>
                            <th>Логин аккаунта</th>
                            <th>Статус</th>
                            <th>Статус провижининга</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="account : ${accounts}">
                            <td th:text="${account.id}">1</td>
                            <td th:text="${account.system.name}">System</td>
                            <td th:text="${account.accountLogin}">login@system</td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${account.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${account.status}">ACTIVE</span>
                            </td>
                            <td th:text="${account.provisioningStatus}">SUCCESS</td>
                            <td>
                                <div class="btn-group" role="group">
                                    <form th:if="${account.status.name() == 'ACTIVE'}"
                                          th:action="@{/users/{userId}/accounts/{accountId}/block(userId=${user.id}, accountId=${account.id})}" 
                                          method="post">
                                        <button class="btn btn-sm btn-outline-warning" type="submit">Блокировать</button>
                                    </form>
                                    <form th:if="${account.status.name() != 'ACTIVE'}"
                                          th:action="@{/users/{userId}/accounts/{accountId}/unblock(userId=${user.id}, accountId=${account.id})}" 
                                          method="post">
                                        <button class="btn btn-sm btn-outline-success" type="submit">Разблокировать</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(accounts)}">
                            <td colspan="6">Нет аккаунтов у этого пользователя</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{components/layout :: scripts}"></div>
</body>
</html>
