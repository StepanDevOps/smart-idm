<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Согласование заявки — Smart IDM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f9fafb; }
        .card { max-width: 600px; margin: 2rem auto; padding: 2rem; border-radius: 8px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .readonly { background: #f3f4f6; color: #6b7280; }
    </style>
</head>
<body>
<div class="card">
    <h3 class="mb-4">Согласование заявки #<span th:text="${requestId}">?</span></h3>

    <div th:if="${request}">
        <div class="form-group">
            <label>Заявитель:</label>
            <input type="text" class="form-control readonly" th:value="${request.requestor.firstName + ' ' + request.requestor.lastName}" readonly>
        </div>

        <div class="form-group">
            <label>Пользователь:</label>
            <input type="text" class="form-control readonly" th:value="${request.requestedFor.firstName + ' ' + request.requestedFor.lastName}" readonly>
        </div>

        <div class="form-group">
            <label>Роль:</label>
            <input type="text" class="form-control readonly" th:value="${request.role.name}" readonly>
        </div>

        <div class="form-group">
            <label>Обоснование:</label>
            <textarea class="form-control readonly" rows="3" readonly th:text="${request.justification}">-</textarea>
        </div>

        <div class="form-group">
            <label>Статус:</label>
            <input type="text" class="form-control readonly" th:value="${request.status}" readonly>
        </div>

        <hr class="my-4"/>

        <form th:action="@{'/requests/' + ${requestId} + '/approve'}" method="post">
            <input type="hidden" name="approverId" th:value="${param.approverId[0]}">

            <div class="form-group">
                <label>Решение:</label>
                <div class="d-grid gap-2">
                    <button type="submit" name="approved" value="true" class="btn btn-success">
                        Одобрить
                    </button>
                    <button type="submit" name="approved" value="false" class="btn btn-danger">
                        Отклонить
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div th:unless="${request}">
        <div class="alert alert-danger">Заявка не найдена</div>
    </div>

    <div class="mt-4">
        <a href="/requests" class="btn btn-secondary">Назад к списку заявок</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
