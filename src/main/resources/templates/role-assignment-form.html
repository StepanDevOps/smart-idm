<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout :: head('Создать назначение — Smart IDM')}"></head>
<body>
<div class="d-flex vh-100">
    <aside th:replace="~{components/layout :: sidebar('role-assignments')}"></aside>

    <main class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{components/layout :: header}"></div>

        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 th:text="${pageTitle}">Создать назначение роли</h5>
                <a th:href="@{/role-assignments}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Назад к списку
                </a>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="card-body">
                    <form th:action="@{/role-assignments}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Пользователь *</label>
                            <select name="userId" class="form-select" required>
                                <option value="">Выберите пользователя</option>
                                <option th:each="user : ${users}" 
                                        th:value="${user.id}" 
                                        th:text="${user.lastName} + ' ' + ${user.firstName} + ' (' + ${user.login} + ')'">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Целевая система</label>
                            <select id="systemSelect" class="form-select" onchange="filterRoles()">
                                <option value="">Все системы (глобальные роли)</option>
                                <option th:each="system : ${systems}"
                                        th:value="${system.id}"
                                        th:text="${system.name}">
                                </option>
                            </select>
                            <small class="text-muted">Роли будут отфильтрованы по выбранной системе</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Роль *</label>
                            <select id="roleSelect" name="roleId" class="form-select" required>
                                <option value="">Выберите роль</option>
                                <option th:each="role : ${roles}"
                                        th:value="${role.id}"
                                        th:text="${role.name} + (role.system != null ? ' (' + role.system.name + ')' : ' (Глобальная)')">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Причина назначения</label>
                            <textarea name="reason" class="form-control" rows="3" 
                                      placeholder="Укажите причину назначения роли..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Дата начала</label>
                                    <input type="date" name="effectiveFrom" class="form-control" />
                                    <small class="text-muted">Если не указано — с текущего дня</small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Дата окончания</label>
                                    <input type="date" name="effectiveTo" class="form-control" />
                                    <small class="text-muted">Оставьте пустым для бессрочного назначения</small>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/role-assignments}" class="btn btn-secondary">Отмена</a>
                            <button type="submit" class="btn btn-primary">Создать назначение</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{components/layout :: scripts}"></div>

<script>
// Инициализация: если roleSelect пуст, но есть только один вариант — подсказка
document.addEventListener('DOMContentLoaded', function () {
    filterRoles();
});

/**
 * Фильтрует роли на основе выбранной системы через AJAX.
 */
function filterRoles() {
    var systemSelect = document.getElementById('systemSelect');
    var roleSelect = document.getElementById('roleSelect');
    var systemId = systemSelect.value;

    // Очищаем текущие опции ролей (кроме первой)
    roleSelect.innerHTML = '<option value="">Выберите роль</option>';

    if (!systemId) {
        // systemId пуст — грузим глобальные роли (controller использует -1 как null)
        fetch('/role-assignments/roles/-1')
            .then(function (response) { return response.json(); })
            .then(function (roles) { populateRoles(roleSelect, roles); })
            .catch(function () { /* fallback: оставить пустым */ });
    } else {
        fetch('/role-assignments/roles/' + systemId)
            .then(function (response) { return response.json(); })
            .then(function (roles) { populateRoles(roleSelect, roles); })
            .catch(function () { /* fallback: оставить пустым */ });
    }
}

/**
 * Заполняет select опциями ролей.
 */
function populateRoles(select, roles) {
    if (!roles || roles.length === 0) {
        var opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'Нет доступных ролей';
        select.appendChild(opt);
        return;
    }

    roles.forEach(function (role) {
        var opt = document.createElement('option');
        opt.value = role.id;
        var systemLabel = role.system ? ' (' + role.system.name + ')' : ' (Глобальная)';
        opt.textContent = role.name + systemLabel;
        select.appendChild(opt);
    });
}
</script>
</body>
</html>
