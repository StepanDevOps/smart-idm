<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">Sign in</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>

<div class="login-page">
    <!-- Управление языком и темой -->
    <div class="top-controls">
        <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" id="langDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-globe"></i>
                <span th:text="#{lang.english}">English</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="langDropdown">
                <li><a class="dropdown-item" href="?lang=en" th:text="#{lang.english}">English</a></li>
                <li><a class="dropdown-item" href="?lang=ru" th:text="#{lang.russian}">Русский</a></li>
            </ul>
        </div>
        <button class="btn btn-sm btn-outline-secondary" id="themeToggle" th:title="#{button.toggleTheme}">
            <i class="bi bi-circle-half"></i>
        </button>
    </div>

    <div class="container" id="container">
        <!-- Форма регистрации -->
        <div class="form-container sign-up">
            <form th:action="@{/register}" method="post" class="needs-validation" novalidate>
                <h1 th:text="#{register.title}">Create Account</h1>
                <div class="sso-button">
                    <button type="button" class="btn-sso">
                        <i class="bi bi-box-arrow-in-right"></i>
                        <span th:text="#{login.sso}">Sign in with SSO</span>
                    </button>
                </div>
                <span th:text="#{register.orEmail}">or use your email for registration</span>
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" th:text="#{register.button}">Sign Up</button>
            </form>
        </div>

        <!-- Форма входа -->
        <div class="form-container sign-in">
            <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                <h1 th:text="#{login.title}">Sign In</h1>
                <div class="sso-button">
                    <button type="button" class="btn-sso">
                        <i class="bi bi-box-arrow-in-right"></i>
                        <span th:text="#{login.sso}">Sign in with SSO</span>
                    </button>
                </div>
                <span th:text="#{login.orEmail}">or use your email password</span>
                <input type="text" name="username" placeholder="Username" required autofocus>
                <input type="password" name="password" placeholder="Password" required>
                <a href="#" th:text="#{login.forgotPassword}">Forget Your Password?</a>
                <button type="submit" th:text="#{login.signin}">Sign In</button>
            </form>
        </div>

        <!-- Панель переключения -->
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1 th:text="#{login.welcomeBack}">Welcome Back!</h1>
                    <p th:text="#{login.leftPanelDesc}">Enter your personal details to use all of site features</p>
                    <button class="hidden" id="login" th:text="#{login.signin}">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1 th:text="#{register.hello}">Hello, Friend!</h1>
                    <p th:text="#{register.rightPanelDesc}">Register with your personal details to use all of site features</p>
                    <button class="hidden" id="register" th:text="#{register.button}">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Блок для сообщений об ошибках/успехе -->
    <div th:if="${errorMessage}" class="alert-container">
        <div class="alert alert-danger" th:text="${errorMessage}"></div>
    </div>
    <div th:if="${logoutMessage}" class="alert-container">
        <div class="alert alert-success" th:text="${logoutMessage}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/login.js}"></script>
<script>
    // Клиентская валидация Bootstrap
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
<script>
    // Theme cookie helper
    function setCookie(name, value, days) {
        var maxAge = days * 24 * 60 * 60;
        document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; max-age=' + maxAge + '; samesite=lax';
    }
    function getCookie(name) {
        var value = '; ' + document.cookie;
        var parts = value.split('; ' + name + '=');
        if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
        return null;
    }
    function applyTheme(theme, persist){
        var root = document.documentElement;
        var isDark = theme === 'dark';
        root.classList.toggle('dark-theme', isDark);
        root.setAttribute('data-theme', isDark ? 'dark' : 'light');
        if (persist !== false) setCookie('smart-idm-theme', isDark ? 'dark' : 'light', 365);
    }
    document.addEventListener('DOMContentLoaded', function(){
        applyTheme(getCookie('smart-idm-theme') || 'light', false);
        document.addEventListener('click', function(e){
            if (e.target && (e.target.id === 'themeToggle' || e.target.closest('#themeToggle'))){
                var isDarkNow = !document.documentElement.classList.contains('dark-theme');
                applyTheme(isDarkNow ? 'dark' : 'light', true);
            }
        });
    });
</script>
</body>
</html>
