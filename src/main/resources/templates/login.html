<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="#{login.title}">Sign in</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <style>
        body{font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial; background:var(--bg);}
        .login-outer{min-height:100vh; display:flex; align-items:center; justify-content:center;}
        .login-card{max-width:420px; width:100%; border-radius:8px; padding:2rem;}
        .brand{font-family: 'Inter'; font-weight:700; letter-spacing:0.2px}
        .mono{font-family: 'JetBrains Mono', monospace}
        .form-control:focus{box-shadow: 0 0 0 .15rem rgba(79,70,229,.12);}
    </style>
</head>
<body>
<div class="login-outer">
    <div class="card login-card shadow-sm">
        <div class="card-body">
            <div class="text-center mb-4">
                <div class="brand fs-4" th:text="#{app.title}">Smart IDM</div>
                <div class="text-muted small" th:text="#{login.title}">Sign in to Smart IDM</div>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:if="${logoutMessage}" class="alert alert-success" th:text="${logoutMessage}"></div>

            <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label" th:text="#{login.username}">Username</label>
                    <input id="username" name="username" type="text" class="form-control" placeholder="admin" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label" th:text="#{login.password}">Password</label>
                    <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required>
                </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
                            <label class="form-check-label small" for="rememberMe" th:text="#{login.remember}">Remember me</label>
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="me-2">
                                <div class="dropdown">
                                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" id="langDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                                        <i class="bi bi-globe"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="langDropdown">
                                        <li><a class="dropdown-item" href="?lang=en" th:text="#{lang.english}">English</a></li>
                                        <li><a class="dropdown-item" href="?lang=ru" th:text="#{lang.russian}">Русский</a></li>
                                    </ul>
                                </div>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary" id="themeToggle" th:title="#{button.toggleTheme}"><i class="bi bi-circle-half"></i></button>
                            </div>
                        </div>
                    </div>

                <div class="d-grid">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-box-arrow-in-right me-1"></i>
                        <span th:text="#{login.signin}">Sign in</span>
                    </button>
                </div>
            </form>

            <div class="text-center mt-3 small text-muted">
                <span th:text="#{app.description}">MVP IDM system for Joiner, Mover, Leaver and Access Request processing</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Простая клиентская валидация Bootstrap
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
<script>
    // Theme cookie helper (apply theme on login page too)
    function setCookie(name, value, days) {
        var maxAge = days * 24 * 60 * 60;
        document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; max-age=' + maxAge + '; samesite=lax';
    }
    function getCookie(name) {
        var value = '; ' + document.cookie;
        var parts = value.split('; ' + name + '=');
        if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
        return null;
    }
    function applyTheme(theme, persist){
        var root = document.documentElement;
        var isDark = theme === 'dark';
        root.classList.toggle('dark-theme', isDark);
        root.setAttribute('data-theme', isDark ? 'dark' : 'light');
        if (persist !== false) setCookie('smart-idm-theme', isDark ? 'dark' : 'light', 365);
    }
    document.addEventListener('DOMContentLoaded', function(){
        applyTheme(getCookie('smart-idm-theme') || 'light', false);
        document.addEventListener('click', function(e){
            if (e.target && (e.target.id === 'themeToggle' || e.target.closest('#themeToggle'))){
                var isDarkNow = !document.documentElement.classList.contains('dark-theme');
                applyTheme(isDarkNow ? 'dark' : 'light', true);
            }
        });
    });
</script>
</body>
</html>
