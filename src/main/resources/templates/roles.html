<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout :: head('Roles — Smart IDM')}"></head>
<body>
<div class="d-flex vh-100">
    <aside th:replace="~{components/layout :: sidebar('target-systems')}"></aside>

    <main class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{components/layout :: header}"></div>

        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 th:text="${pageTitle}">Роли</h5>
                <a th:href="@{/roles/new}" class="btn btn-sm btn-primary">
                    <i class="bi bi-plus-circle"></i> Добавить роль
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card mb-3">
                <div class="card-body">
                    <form method="get" class="row g-3 align-items-center">
                        <div class="col-auto">
                            <label for="systemId" class="col-form-label">Фильтр по системе:</label>
                        </div>
                        <div class="col-auto">
                            <select id="systemId" name="systemId" class="form-select form-select-sm" onchange="this.form.submit()">
                                <option value="">-- Все системы --</option>
                                <option th:each="system : ${systems}"
                                        th:value="${system.id}"
                                        th:text="${system.name}"
                                        th:selected="${systemId != null and systemId == system.id}">
                                </option>
                            </select>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Описание</th>
                            <th>Система</th>
                            <th>Тип</th>
                            <th>Чувствительная</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="role : ${roles}">
                            <td th:text="${role.id}">1</td>
                            <td th:text="${role.name}">Role Name</td>
                            <td th:text="${role.description ?: '-'}">Description</td>
                            <td>
                                <span th:text="${role.system != null ? role.system.name : '-'}">-</span>
                            </td>
                            <td th:text="${role.roleType}">BUSINESS</td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${role.isSensitive} ? 'bg-danger' : 'bg-secondary'"
                                      th:text="${role.isSensitive ? 'Да' : 'Нет'}">Нет</span>
                            </td>
                            <td>
                                <div class="btn-group" role="group">
                                    <a th:href="@{/roles/edit/{id}(id=${role.id})}" 
                                       class="btn btn-sm btn-outline-primary">Редактировать</a>
                                    <form th:action="@{/roles/delete/{id}(id=${role.id})}" 
                                          method="post"
                                          onsubmit="return confirm('Удалить роль?');">
                                        <button class="btn btn-sm btn-outline-danger" type="submit">Удалить</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(roles)}">
                            <td colspan="7">Нет ролей</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <nav class="mt-3">
                <a th:href="@{/target-systems}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Назад к системам
                </a>
            </nav>
        </div>
    </main>
</div>

<div th:replace="~{components/layout :: scripts}"></div>
</body>
</html>
