<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Целевые системы</title>
</head>
<body>
    <h1 th:text="${pageTitle}">Целевые системы</h1>

    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <p>
        <a th:href="@{/target-systems/new}">Добавить систему</a>
    </p>

    <table border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Описание</th>
                <th>Тип</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="system : ${systems}">
                <td th:text="${system.id}">1</td>
                <td th:text="${system.name}">System Name</td>
                <td th:text="${system.description ?: '-'}">Description</td>
                <td th:text="${system.type}">Type</td>
                <td>
                    <a th:href="@{/target-systems/{id}(id=${system.id})}">Просмотр</a> |
                    <a th:href="@{/target-systems/edit/{id}(id=${system.id})}">Редактировать</a> |
                    <a th:href="@{/target-systems/delete/{id}(id=${system.id})}" 
                       onclick="return confirm('Удалить систему?');">Удалить</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(systems)}">
                <td colspan="5">Нет целевых систем</td>
            </tr>
        </tbody>
    </table>

    <p>
        <a th:href="@{/}">На главную</a>
    </p>
</body>
</html>
