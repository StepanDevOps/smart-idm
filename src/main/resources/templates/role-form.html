<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout :: head('Role Form — Smart IDM')}"></head>
<body>
<div class="d-flex vh-100">
    <aside th:replace="~{components/layout :: sidebar('target-systems')}"></aside>

    <main class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{components/layout :: header}"></div>

        <div class="container py-4">
            <h5 th:text="${pageTitle}">Форма роли</h5>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="card-body">
                    <form th:if="${isEdit}" method="post" th:action="@{/roles/update/{id}(id=${role.id})}">
                        <input type="hidden" name="id" th:value="${role.id}" />
                        <div class="mb-3">
                            <label for="name" class="form-label">Название <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name"
                                   th:value="${role.name}" required autofocus />
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <input type="text" class="form-control" id="description" name="description"
                                   th:value="${role.description}" />
                        </div>

                        <div class="mb-3">
                            <label for="systemId" class="form-label">Система</label>
                            <select id="systemId" name="systemId" class="form-select">
                                <option value="">-- Не выбрано --</option>
                                <option th:each="system : ${systems}"
                                        th:value="${system.id}"
                                        th:text="${system.name}"
                                        th:selected="${role.system != null and role.system.id == system.id}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="roleType" class="form-label">Тип роли</label>
                            <select id="roleType" name="roleType" class="form-select">
                                <option value="BUSINESS" th:selected="${role.roleType == null or role.roleType?.name() == 'BUSINESS'}">Бизнес-роль</option>
                                <option value="TECHNICAL" th:selected="${role.roleType?.name() == 'TECHNICAL'}">Техническая</option>
                                <option value="ADMIN" th:selected="${role.roleType?.name() == 'ADMIN'}">Административная</option>
                                <option value="COMPLIANCE" th:selected="${role.roleType?.name() == 'COMPLIANCE'}">Комплаенс</option>
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="isSensitive" name="isSensitive"
                                   th:checked="${role.isSensitive}" />
                            <label class="form-check-label" for="isSensitive">
                                Чувствительная роль (требует дополнительного одобрения)
                            </label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Обновить</button>
                            <a th:href="@{/roles}" class="btn btn-outline-secondary">Отмена</a>
                        </div>
                    </form>

                    <form th:if="${!isEdit}" method="post" th:action="@{/roles/create}">
                        <div class="mb-3">
                            <label for="name" class="form-label">Название <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name" required autofocus />
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <input type="text" class="form-control" id="description" name="description" />
                        </div>

                        <div class="mb-3">
                            <label for="systemId" class="form-label">Система</label>
                            <select id="systemId" name="systemId" class="form-select">
                                <option value="">-- Не выбрано --</option>
                                <option th:each="system : ${systems}"
                                        th:value="${system.id}"
                                        th:text="${system.name}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="roleType" class="form-label">Тип роли</label>
                            <select id="roleType" name="roleType" class="form-select">
                                <option value="BUSINESS">Бизнес-роль</option>
                                <option value="TECHNICAL">Техническая</option>
                                <option value="ADMIN">Административная</option>
                                <option value="COMPLIANCE">Комплаенс</option>
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="isSensitive" name="isSensitive" />
                            <label class="form-check-label" for="isSensitive">
                                Чувствительная роль (требует дополнительного одобрения)
                            </label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Создать</button>
                            <a th:href="@{/roles}" class="btn btn-outline-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{components/layout :: scripts}"></div>
</body>
</html>
