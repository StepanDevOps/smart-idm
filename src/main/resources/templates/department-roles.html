<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout :: head('Связи департаментов с ролями — Smart IDM')}"></head>
<body>
<div class="d-flex vh-100">
    <aside th:replace="~{components/layout :: sidebar('department-roles')}"></aside>

    <main class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{components/layout :: header}"></div>

        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 th:text="${pageTitle}">Связи департаментов с ролями</h5>
                <a th:href="@{/department-roles/new}" class="btn btn-sm btn-primary">
                    <i class="bi bi-plus-circle"></i> Создать связь
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Департамент</th>
                            <th>Роль</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="dr : ${departmentRoles}">
                            <td th:text="${dr.id}">1</td>
                            <td th:text="${dr.department.name}">Департамент</td>
                            <td th:text="${dr.role.name}">Роль</td>
                            <td>
                                <form th:action="@{/department-roles/{id}(id=${dr.id})}"
                                      method="post"
                                      onsubmit="return confirm('Удалить эту связь?');">
                                    <input type="hidden" name="_method" value="DELETE"/>
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        <i class="bi bi-trash"></i> Удалить
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(departmentRoles)}">
                            <td colspan="4" class="text-center text-muted">Нет связей департаментов с ролями</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{components/layout :: scripts}"></div>
</body>
</html>
