<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.pageTitle}">smart-idm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
        form { margin-top: 1rem; padding: 1rem; border: 1px solid #ddd; }
        label { display: block; margin-top: 0.5rem; }
        input, select { width: 100%; padding: 0.4rem; box-sizing: border-box; }
        button { margin-top: 1rem; padding: 0.6rem 1rem; }
    </style>
</head>
<body>
<h1 th:text="#{app.name}">smart-idm</h1>
<p th:text="#{app.description}">MVP IDM system for Joiner, Mover, Leaver and Access Request processing.</p>

<nav style="margin: 1rem 0;">
    <a th:href="@{/}">Главная</a> |
    <a th:href="@{/users}">Пользователи</a> |
    <a th:href="@{/requests}">Заявки</a> |
    <a th:href="@{/target-systems}">Целевые системы</a> |
    <a th:href="@{/audit}">Аудит</a>
</nav>

<h2 th:text="#{section.eventSimulation}">Event Simulation</h2>
<form th:action="@{/events/simulate}" method="post">
    <label for="eventType" th:text="#{form.label.eventType}">Event Type</label>
    <select id="eventType" name="eventType">
        <option value="HR_EVENT" th:text="#{event.type.hr}">HR_EVENT</option>
        <option value="ACCESS_REQUEST" th:text="#{event.type.accessRequest}">ACCESS_REQUEST</option>
    </select>

    <label for="userId" th:text="#{form.label.userId}">User ID</label>
    <input id="userId" name="userId" type="number" min="1" required>

    <label for="details" th:text="#{form.label.details}">Details</label>
    <input id="details" name="details" type="text" required>

    <button type="submit" th:text="#{button.simulateEvent}">Create simulation</button>
</form>

<h2 th:text="#{section.requests}">Requests</h2>
<table>
    <thead>
    <tr>
        <th th:text="#{table.column.id}">ID</th>
        <th th:text="#{table.column.user}">User</th>
        <th th:text="#{table.column.system}">System</th>
        <th th:text="#{table.column.role}">Role</th>
        <th th:text="#{table.column.status}">Status</th>
        <th th:text="#{table.column.created}">Created</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="request : ${requests}">
        <td th:text="${request.id}"></td>
        <td th:text="${request.requestor != null ? request.requestor.firstName + ' ' + request.requestor.lastName : '—'}"></td>
        <td th:text="${request.role != null and request.role.system != null ? request.role.system.name : '—'}"></td>
        <td th:text="${request.role != null ? request.role.name : '—'}"></td>
        <td th:text="${request.status}"></td>
        <td th:text="${request.createdAt}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(requests)}">
        <td colspan="6" th:text="#{table.empty.requests}">No requests yet</td>
    </tr>
    </tbody>
</table>
</body>
</html>
