<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout :: head('Departments — Smart IDM')}"></head>
<body>
<div class="d-flex vh-100">
    <aside th:replace="~{components/layout :: sidebar('departments')}"></aside>

    <main class="flex-grow-1 d-flex flex-column">
        <div th:replace="~{components/layout :: header}"></div>

        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 th:text="${pageTitle}">Departments</h5>
                <a th:href="@{/departments/new}" class="btn btn-sm btn-primary">
                    <i class="bi bi-plus-circle"></i> Create Department
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Parent</th>
                            <th>Users</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="dept : ${departments}">
                            <td th:text="${dept.id}">1</td>
                            <td><code th:text="${dept.code}">DEPT001</code></td>
                            <td th:text="${dept.name}">Name</td>
                            <td>
                                <span th:if="${dept.parentUnit != null}" th:text="${dept.parentUnit.name}">Parent</span>
                                <span th:if="${dept.parentUnit == null}" class="text-muted">— (root)</span>
                            </td>
                            <td>
                                <span th:text="${dept.userCount != null ? dept.userCount : 0}">0</span>
                            </td>
                            <td>
                                <form th:if="${!dept.hasChildren and (dept.userCount == null or dept.userCount == 0)}"
                                      th:action="@{/departments/{id}(id=${dept.id})}"
                                      method="post"
                                      onsubmit="return confirm('Delete this department?');">
                                    <input type="hidden" name="_method" value="DELETE"/>
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </form>
                                <span th:if="${dept.hasChildren}" class="text-muted small">Cannot delete (has children)</span>
                                <span th:if="${dept.userCount != null and dept.userCount > 0}" class="text-muted small">Cannot delete (has users)</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(departments)}">
                            <td colspan="6" class="text-center text-muted">No departments</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{components/layout :: scripts}"></div>
</body>
</html>
